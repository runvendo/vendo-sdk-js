# Vendo SDK API Surface Manifest
# Authoritative list of methods both vendo-sdk-py and @vendodev/sdk MUST implement.
# Drift is a build error in both SDKs.
#
# Methods are namespaced by the class/module they live on.
# Naming: snake_case here; each SDK applies its language idiom (Python keeps
# snake_case; TS converts to camelCase).
#
# v1.0 surface — extend with care; every addition is a breaking parity change
# until both SDKs ship it.

api_version: "2026-05-02"
manifest_version: 1

client:
  # Methods on the top-level client class (Vendo / AsyncVendo / new Vendo()).
  - name: "for_user"
    args: ["user_jwt"]
    description: "Return a new client instance scoped to a user JWT"

  - name: "token"
    args: ["slug"]
    returns: "string"

  - name: "tokens"
    args: ["slugs"]
    returns: "map[slug → string|null]"

  - name: "invalidate"
    args: ["slug"]
    returns: "void"

  - name: "connect_url"
    args: ["slug", "*", "return_to?", "state?"]
    returns: "string"

connections_api:
  # Methods on client.connections.
  - name: "list"
    returns: "Connection[]"
  - name: "get"
    args: ["slug"]
    returns: "Connection | null"

integrations_api:
  - name: "list"
    returns: "Integration[]"
  - name: "get"
    args: ["slug"]
    returns: "Integration | null"

billing_api:
  - name: "balance"
    returns: "Balance"
  - name: "spend_caps"
    returns: "SpendCaps"
  - name: "usage"
    args: ["*", "period?"]
    returns: "object"

errors:
  # Each typed exception MUST be exported by both SDKs.
  - "VendoError"
  - "AuthError"
  - "NotConnected"
  - "NeedsReauth"
  - "BalanceExhausted"
  - "SpendCapExceeded"
  - "RateLimited"
  - "UpstreamError"
  - "ValidationError"
  - "IdempotencyConflict"

testing:
  # Required testing helpers.
  - "MockClient"     # sync (Python) or default (TS) mock
  - "fake_connection" # builder
  - "MockSSE"        # scripted SSE event emitter for tests

reconciler:
  - name: "bootstrap"
    args: ["*", "env_file", "mapping"]
  - name: "start"
    args: ["*", "env_file", "mapping", "on_change?", "reload_url?"]
    returns: "Reconciler (with .stop())"
